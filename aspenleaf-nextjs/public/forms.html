<!DOCTYPE html>
<html>
  <head><title>Forms</title></head>
  <body>
    <!-- Netlify form detection for estimate-request -->
    <form name="estimate-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="address" />
      <input type="text" name="projectType" />
      <input type="text" name="propertyType" />
      <input type="text" name="squareFootage" />
      <input type="text" name="timeline" />
      <input type="text" name="budgetRange" />
      <input type="text" name="contactChoice" />
      <textarea name="message"></textarea>
    </form>

    <!-- Netlify form detection for contact -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="address" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
